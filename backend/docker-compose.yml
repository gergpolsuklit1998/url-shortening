services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: url-shortening-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: "${PORT:-8080}"
      MONGODB_URI: "${MONGODB_URI:-mongodb://root:password@mongodb:27017}"
      DB_NAME: "${DB_NAME:-url-shortening}"
      GIN_MODE: "${GIN_MODE:-debug}"
    depends_on:
      - mongodb
    networks:
      - mongodb_network

  mongodb:
    image: mongo:latest
    container_name: url-shortening-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: "${MONGO_INITDB_ROOT_USERNAME:-root}"
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_INITDB_ROOT_PASSWORD:-password}"
    volumes:
      - mongodb-data:/data/db
      - mongodb-log:/var/log/mongodb
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD-SHELL", "mongosh --eval 'db.runCommand({ ping: 1 })' --quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - mongodb_network

  mongo-express:
    image: mongo-express:latest
    container_name: url-shortening-mongo-express
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: "${MONGO_INITDB_ROOT_USERNAME:-root}"
      ME_CONFIG_MONGODB_ADMINPASSWORD: "${MONGO_INITDB_ROOT_PASSWORD:-password}"
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_BASICAUTH_USERNAME: "${MONGO_EXPRESS_USERNAME:-admin}"
      ME_CONFIG_BASICAUTH_PASSWORD: "${MONGO_EXPRESS_PASSWORD:-password}"
    ports:
      - "8081:8081"
    depends_on:
      - mongodb
    networks:
      - mongodb_network

volumes:
  mongodb-data:
    driver: local
  mongodb-log:
    driver: local

networks:
  mongodb_network:
    driver: bridge
